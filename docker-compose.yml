version: "3.9"

services:

  redis:
    image: redis:7-alpine
    networks:
      - app-network
    expose:
      - "6379"

  api:
    build: ./api
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - TESTING=false
    depends_on:
      - redis
    networks:
      - app-network
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  worker:
    build: ./worker
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
      - api
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  frontend:
    build: ./frontend
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    ports:
      - "3000:3000"
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

networks:
  app-network:
    driver: bridge
