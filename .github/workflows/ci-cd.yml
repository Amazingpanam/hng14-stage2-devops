import pytest
from fastapi.testclient import TestClient
from unittest.mock import Mock, patch
import sys
import os

# Ensure app import works in CI
sys.path.append(os.path.dirname(os.path.dirname(os.path.abspath(__file__))))

from main import app

client = TestClient(app)

# ----------------------------
# 1. Health Check Test
# ----------------------------
def test_health_endpoint():
    response = client.get("/health")
    assert response.status_code == 200
    assert "status" in response.json()

# ----------------------------
# 2. Create Job (Mock Redis)
# ----------------------------
@patch("main.redis_client", new_callable=Mock)
def test_create_job(mock_redis):
    mock_redis.hset.return_value = 1
    mock_redis.lpush.return_value = 1

    payload = {"data": "test job data"}

    response = client.post("/jobs", json=payload)

    assert response.status_code == 200
    assert "job_id" in response.json() or "id" in response.json()
    assert response.json().get("status") in ["pending", "queued"]

# ----------------------------
# 3. Get Job Status
# ----------------------------
@patch("main.redis_client", new_callable=Mock)
def test_get_job_status(mock_redis):
    mock_redis.hgetall.return_value = {
        "id": "123",
        "status": "completed",
        "result": "test result"
    }

    response = client.get("/jobs/123")

    assert response.status_code == 200
    assert response.json()["status"] == "completed"

# ----------------------------
# 4. Invalid Job Creation
# ----------------------------
def test_invalid_job_creation():
    response = client.post("/jobs", json={})

    # FastAPI should reject empty payload
    assert response.status_code in [400, 422]
